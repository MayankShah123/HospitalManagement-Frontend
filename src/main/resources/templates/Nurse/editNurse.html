<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Nurse</title>
    <style>
        body { font-family: Arial; background: #f5f5f5; }
        .container {
            width: 40%;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
        input, select {
            width: 100%;
            padding: 8px;
            margin: 10px 0;
        }
        button {
            padding: 10px;
            width: 100%;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">

    <h2>Edit Nurse</h2>

    <form th:action="@{/nurses/update/{id}(id=${nurse.employeeId})}"
          method="post"
          th:object="${nurse}">

        <!-- Hidden ID -->
        <input type="hidden" th:field="*{employeeId}">

        <!-- Name -->
        <input type="text" th:field="*{name}" placeholder="Name" required>

        <!-- Position -->
        <select th:field="*{position}">
            <option value="Nurse">Nurse</option>
            <option value="Head Nurse">Head Nurse</option>
        </select>

        <!-- Registered -->
        <select th:field="*{registered}">
            <option value="true">Yes</option>
            <option value="false">No</option>
        </select>

        <!-- SSN -->
        <input type="number" th:field="*{ssn}" placeholder="SSN" required>

        <button type="submit">Update Nurse</button>

    </form>

</div>

</body>
</html>
