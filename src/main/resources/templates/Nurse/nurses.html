<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Nurse List</title>
    <style>

        body {
            font-family: Arial;
            background: #f5f5f5;
        }

        .container {
            width: 80%;
            margin: auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .header h2 {
            margin: 0;
        }

        .btn {
            padding: 8px 15px;
            border: none;
            background: #007bff;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        .search-filter {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        input, select {
            padding: 5px;
            width: 200px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }

        .pagination {
            text-align: center;
            margin-top: 15px;
        }

        .action-btn {
            color: blue;
            cursor: pointer;
            margin: 0 5px;
        }

    </style>
</head>
<body>

<div class="container">

    <!-- Header -->
    <div class="header">
        <h2>Nurse List</h2>
        <button class="btn"><a th:href="@{/nurses/add}">Add Nurse</a></button>
    </div>

    <!-- Search + Filter -->
    <div class="search-filter">
        <input type="text" placeholder="Search...">
        <select>
            <option>Filter by Position</option>
            <option>Nurse</option>
            <option>Head Nurse</option>
        </select>
    </div>

    <!-- Table -->
    <table>
        <tr>
            <th>Sr No</th>
            <th>Name</th>
            <th>Position</th>
            <th>Registered</th>
            <th>Availability</th>
            <th>Action</th>
        </tr>

        <tr th:each="n, iter : ${nurses}">
            <td th:text="${currentPage * pageSize + iter.index + 1}"></td>
            <td th:text="${n.name}"></td>
            <td th:text="${n.position}"></td>
            <td th:text="${n.registered ? 'Yes' : 'No'}"></td>
            <td th:text="${n.availability}"></td>
            <td>
                <a th:href="@{/nurses/view/{id}(id=${n.employeeId})}">View</a>
                <a th:href="@{/nurses/edit/{id}(id=${n.employeeId})}">Edit</a>
            </td>
        </tr>

    </table>

    <div class="pagination">

    <span>
        Page <b th:text="${currentPage + 1}"></b> of
        <b th:text="${totalPages}"></b>
    </span>

        <div class="page-buttons">

            <!-- Previous -->
            <a th:if="${currentPage > 0}"
               th:href="@{/nurses(page=${currentPage - 1}, size=${pageSize})}">
                Previous
            </a>

            <!-- Page Numbers -->
            <span th:each="i : ${#numbers.sequence(0, totalPages - 1)}">

            <a th:href="@{/nurses(page=${i}, size=${pageSize})}"
               th:text="${i + 1}"
               th:classappend="${i == currentPage} ? 'active' : ''">
            </a>

        </span>

            <!-- Next -->
            <a th:if="${currentPage + 1 < totalPages}"
               th:href="@{/nurses(page=${currentPage + 1}, size=${pageSize})}">
                Next
            </a>

        </div>
    </div>

</div>

</body>
</html>
